version: "3.8"

services:
  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    volumes:
      - /data/compose/24/configuration/chirpstack:/etc/chirpstack
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - REDIS_HOST=redis
      - POSTGRESQL_HOST=postgres
    networks:
      - edge
      - chirpstack-network
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.chirpstack-application-server.entrypoints=web"
        - "traefik.http.routers.chirpstack-application-server.rule=Host(`chirpstack.ding.hu`)"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.routers.chirpstack-application-server.middlewares=redirect-to-https"
        - "traefik.http.routers.chirpstack-application-server-secure.entrypoints=websecure"
        - "traefik.http.routers.chirpstack-application-server-secure.rule=Host(`chirpstack.ding.hu`)"
        - "traefik.http.routers.chirpstack-application-server-secure.tls=true"
        - "traefik.http.routers.chirpstack-application-server-secure.tls.certresolver=le"
        - "traefik.http.routers.chirpstack-application-server-secure.service=chirpstack-application-server"
        - "traefik.http.services.chirpstack-application-server.loadbalancer.server.port=8080"
        - "traefik.docker.network=edge"

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    networks:
      - chirpstack-network
    ports:
      - 1700:1700/udp
    volumes:
      - /data/compose/24/configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    deploy:
      replicas: 1

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    networks:
      - edge
      - chirpstack-network
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.chirpstack-rest-api.entrypoints=web"
        - "traefik.http.routers.chirpstack-rest-api.rule=Host(`chirpstack-api.ding.hu`)"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.routers.chirpstack-rest-api.middlewares=redirect-to-https"
        - "traefik.http.routers.chirpstack-rest-api-secure.entrypoints=websecure"
        - "traefik.http.routers.chirpstack-rest-api-secure.rule=Host(`chirpstack-api.ding.hu`)"
        - "traefik.http.routers.chirpstack-rest-api-secure.tls=true"
        - "traefik.http.routers.chirpstack-rest-api-secure.tls.certresolver=le"
        - "traefik.http.routers.chirpstack-rest-api-secure.service=chirpstack-rest-api"
        - "traefik.http.services.chirpstack-rest-api.loadbalancer.server.port=8090"
        - "traefik.docker.network=edge"

  postgres:
    image: postgres:14-alpine
    volumes:
      - /data/compose/24/configuration/postgresql/initdb:/docker-entrypoint-initdb.d
      - postgresqldata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=root
    networks:
      - chirpstack-network
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    volumes:
      - chirpstack-redis:/data
    networks:
      - chirpstack-network
    deploy:
      replicas: 1

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - /data/compose/24/configuration/mosquitto/config/:/mosquitto/config/
    networks:
      - chirpstack-network
    deploy:
      replicas: 1

volumes:
  postgresqldata:
  chirpstack-redis:

networks:
  edge:
    external: true
  chirpstack-network:
    driver: overlay
